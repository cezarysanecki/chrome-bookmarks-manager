<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Błąd zakładki</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1e2e;
      color: #e2e2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      background: #2a2a3d;
      border: 1px solid #3a3a55;
      border-radius: 12px;
      padding: 32px 36px;
      max-width: 580px;
      width: 100%;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .icon.icon--url   { background: rgba(255,107,107,.12); color: #ff6b6b; }
    .icon.icon--tags  { background: rgba(255,180,50,.12);  color: #ffb432; }
    .icon svg { width: 24px; height: 24px; }

    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }

    .subtitle { font-size: 13px; color: #8888a8; margin-bottom: 20px; line-height: 1.5; }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #8888a8;
      margin-bottom: 6px;
    }

    .value-box {
      background: #1e1e2e;
      border: 1px solid #3a3a55;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
      margin-bottom: 16px;
    }
    .value-box.value-box--url  { color: #ff6b6b; }
    .value-box.value-box--raw  { color: #e2e2f0; }
    .value-box.value-box--warn { color: #ffb432; }

    .hint {
      font-size: 12px;
      color: #8888a8;
      line-height: 1.6;
      margin-top: 4px;
    }
    .hint strong { color: #c8c0ff; }

    .example {
      background: #1e1e2e;
      border: 1px solid #3a3a55;
      border-left: 3px solid #4caf7d;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #4caf7d;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card" id="card"></div>

  <script src="error.js"></script>
</body>
</html>
